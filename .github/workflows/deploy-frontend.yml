name: Deploy Frontend

on:
  push:
    branches:
      - main-disabled

jobs:
  deploy:
    name: Deploy Frontend to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
          COMPOSE_ENV: ${{ secrets.COMPOSE_ENV }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: FRONTEND_ENV,COMPOSE_ENV
          script: |
            set -e

            if [ -z "$COMPOSE_ENV" ]; then
              echo "COMPOSE_ENV secret is empty"
              exit 1
            fi

            if [ -z "$FRONTEND_ENV" ]; then
              echo "FRONTEND_ENV secret is empty"
              exit 1
            fi

            cd /var/www/turnoflow/frontend

            echo "Pulling latest code..."
            git pull origin main

            echo "Writing environment files..."
            printf '%s' "$COMPOSE_ENV" > /var/www/turnoflow/.env
            printf '%s' "$FRONTEND_ENV" > .env

            echo "Building and restarting frontend..."
            docker compose -f /var/www/turnoflow/docker-compose.yml up -d --build --no-deps frontend

            echo "Frontend deployed successfully."
